kind = "web"
previewPath = "/"
title = "MentorBridge"
version = "1.0.0"
id = "artifacts/mentorbridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20292

[services.development]
run = "pnpm --filter @workspace/mentorbridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mentorbridge", "run", "build" ]
publicDir = "artifacts/mentorbridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20292"
BASE_PATH = "/"
