openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GoMindscout API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Mentor categories
  - name: mentors
    description: Mentor profiles
  - name: availability
    description: Mentor availability and slot management
  - name: packages
    description: Mentor packages
  - name: bookings
    description: Session bookings
  - name: reviews
    description: Session reviews
  - name: payments
    description: Payment processing
  - name: admin
    description: Admin operations
  - name: users
    description: User profile management
  - name: chat
    description: Booking-based messaging
  - name: disputes
    description: Session dispute management
  - name: payouts
    description: Mentor payout management
  - name: notifications
    description: User notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    delete:
      operationId: deleteMe
      tags: [users]
      summary: Delete current user account and all associated data
      responses:
        "204":
          description: Account deleted
        "401":
          description: Unauthorized

  # ── Categories ─────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories with mentor counts
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── Mentors ────────────────────────────────────────────────────────────────
  /mentors:
    get:
      operationId: listMentors
      tags: [mentors]
      summary: Search and filter approved mentors
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: language
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: minRating
          in: query
          schema: { type: number }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [featured, rating, price_asc, price_desc, experience, newest]
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Paginated mentor list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorListResponse"
    post:
      operationId: createMentorProfile
      tags: [mentors]
      summary: Submit a new mentor profile (pending approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorProfileInput"
      responses:
        "201":
          description: Created mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"

  /mentors/featured:
    get:
      operationId: getFeaturedMentors
      tags: [mentors]
      summary: Get featured mentors for homepage
      responses:
        "200":
          description: Featured mentors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentorProfile"

  /mentors/me:
    get:
      operationId: getMyMentorProfile
      tags: [mentors]
      summary: Get the authenticated mentor's own profile
      responses:
        "200":
          description: Own mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"
        "404":
          description: No mentor profile found
    patch:
      operationId: updateMyMentorProfile
      tags: [mentors]
      summary: Update own mentor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorProfileUpdate"
      responses:
        "200":
          description: Updated mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"
    delete:
      operationId: deleteMyMentorProfile
      tags: [mentors]
      summary: Delete the authenticated mentor's profile, packages, availability and all related data
      responses:
        "204":
          description: Mentor profile deleted
        "401":
          description: Unauthorized
        "404":
          description: No mentor profile found

  /mentors/{mentorId}/availability:
    get:
      operationId: getMentorAvailability
      tags: [availability]
      summary: Get a mentor's weekly availability schedule
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Availability schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentorAvailabilityDay"

  /mentors/me/availability:
    put:
      operationId: setMyAvailability
      tags: [availability]
      summary: Set own mentor availability schedule (replaces all existing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetAvailabilityInput"
      responses:
        "200":
          description: Updated availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentorAvailabilityDay"

  /mentors/{mentorId}/slots:
    get:
      operationId: getMentorSlots
      tags: [availability]
      summary: Get available booking slots for a mentor on a given date
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
        - name: date
          in: query
          required: true
          schema: { type: string, description: "YYYY-MM-DD" }
        - name: durationMinutes
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"

  /mentors/{mentorId}:
    get:
      operationId: getMentor
      tags: [mentors]
      summary: Get a mentor profile by ID
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"
        "404":
          description: Not found

  # ── Packages ───────────────────────────────────────────────────────────────
  /mentors/{mentorId}/packages:
    get:
      operationId: listMentorPackages
      tags: [packages]
      summary: List packages for a mentor
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

  /packages:
    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a package for own mentor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageInput"
      responses:
        "201":
          description: Created package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{packageId}:
    patch:
      operationId: updatePackage
      tags: [packages]
      summary: Update a package
      parameters:
        - name: packageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageUpdate"
      responses:
        "200":
          description: Updated package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
    delete:
      operationId: deletePackage
      tags: [packages]
      summary: Deactivate a package
      parameters:
        - name: packageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Bookings ───────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: List bookings for current user (mentee or mentor)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [mentee, mentor]
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking (initiates payment flow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created booking with Stripe checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingWithCheckout"

  /bookings/{bookingId}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a single booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (mentor or admin)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/meeting-link:
    patch:
      operationId: updateMeetingLink
      tags: [bookings]
      summary: Mentor sets the meeting link for a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingLinkUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/approve:
    post:
      operationId: approveBooking
      tags: [bookings]
      summary: Mentor approves a booking (generates meeting room, sends emails)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Approved booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/reject:
    post:
      operationId: rejectBooking
      tags: [bookings]
      summary: Mentor rejects a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCancelInput"
      responses:
        "200":
          description: Rejected booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/counter-propose:
    post:
      operationId: counterProposeBooking
      tags: [bookings]
      summary: Mentor proposes a different time for the booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CounterProposeInput"
      responses:
        "200":
          description: Counter-proposed booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/accept-counter:
    post:
      operationId: acceptCounterProposal
      tags: [bookings]
      summary: Mentee accepts mentor's counter-proposed time (generates meeting room)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Confirmed booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/decline-counter:
    post:
      operationId: declineCounterProposal
      tags: [bookings]
      summary: Mentee declines mentor's counter-proposed time (cancels booking)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{bookingId}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking with refund logic
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCancelInput"
      responses:
        "200":
          description: Cancelled booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ── Chat ───────────────────────────────────────────────────────────────────
  /chat/{bookingId}:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get chat messages for a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message in a booking chat
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageResponse"

  # ── Disputes ───────────────────────────────────────────────────────────────
  /disputes:
    post:
      operationId: createDispute
      tags: [disputes]
      summary: Open a dispute for a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeInput"
      responses:
        "201":
          description: Created dispute
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  /disputes/{bookingId}:
    get:
      operationId: getDispute
      tags: [disputes]
      summary: Get dispute for a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Dispute details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  # ── Payouts ────────────────────────────────────────────────────────────────
  /payouts:
    get:
      operationId: getMentorPayouts
      tags: [payouts]
      summary: Get mentor payout info and request history
      responses:
        "200":
          description: Payout info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutInfo"

  /payouts/request:
    post:
      operationId: requestPayout
      tags: [payouts]
      summary: Mentor requests a payout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutRequestInput"
      responses:
        "201":
          description: Created payout request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutRequest"

  # ── Payments ───────────────────────────────────────────────────────────────
  /payments/webhook:
    post:
      operationId: stripeWebhook
      tags: [payments]
      summary: Stripe webhook endpoint
      responses:
        "200":
          description: Received

  # ── Reviews ────────────────────────────────────────────────────────────────
  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a completed booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /mentors/{mentorId}/reviews:
    get:
      operationId: listMentorReviews
      tags: [reviews]
      summary: Get reviews for a mentor
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  # ── Dashboard stats (wow endpoints) ────────────────────────────────────────
  /dashboard/mentee-stats:
    get:
      operationId: getMenteeDashboardStats
      tags: [users]
      summary: Mentee dashboard summary stats
      responses:
        "200":
          description: Mentee stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenteeDashboardStats"

  /dashboard/mentor-stats:
    get:
      operationId: getMentorDashboardStats
      tags: [mentors]
      summary: Mentor dashboard summary stats
      responses:
        "200":
          description: Mentor stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorDashboardStats"

  # ── Admin ──────────────────────────────────────────────────────────────────
  /admin/mentors:
    get:
      operationId: adminListMentors
      tags: [admin]
      summary: Admin list all mentors (any status)
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: All mentor profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MentorProfile"

  /admin/mentors/{mentorId}/approve:
    patch:
      operationId: adminApproveMentor
      tags: [admin]
      summary: Approve or reject a mentor
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorApproval"
      responses:
        "200":
          description: Updated mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"

  /admin/mentors/{mentorId}/feature:
    patch:
      operationId: adminFeatureMentor
      tags: [admin]
      summary: Toggle featured status of a mentor
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureToggle"
      responses:
        "200":
          description: Updated mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfile"

  /admin/mentors/{mentorId}:
    delete:
      operationId: adminDeleteMentor
      tags: [admin]
      summary: Hard delete a mentor profile and all related data
      parameters:
        - name: mentorId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Mentor deleted
        "404":
          description: Mentor not found

  /admin/users/{userId}:
    get:
      operationId: adminGetUserDetails
      tags: [admin]
      summary: Get detailed user info for admin review
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
        "404":
          description: User not found
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Hard delete a user account and all associated data
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [admin]
      summary: Admin list all bookings
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Platform-wide stats for admin dashboard
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/disputes:
    get:
      operationId: adminListDisputes
      tags: [admin]
      summary: Admin list all disputes
      responses:
        "200":
          description: All disputes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dispute"

  /admin/disputes/{disputeId}/resolve:
    patch:
      operationId: adminResolveDispute
      tags: [admin]
      summary: Admin resolves a dispute
      parameters:
        - name: disputeId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeResolution"
      responses:
        "200":
          description: Resolved dispute
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"

  /admin/payouts:
    get:
      operationId: adminListPayouts
      tags: [admin]
      summary: Admin list all payout requests
      responses:
        "200":
          description: All payout requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayoutRequest"

  /admin/payouts/{payoutId}:
    patch:
      operationId: adminUpdatePayout
      tags: [admin]
      summary: Admin approves or marks payout as paid
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutStatusUpdate"
      responses:
        "200":
          description: Updated payout request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutRequest"

  /admin/users/{userId}/suspend:
    patch:
      operationId: adminSuspendUser
      tags: [admin]
      summary: Suspend or reinstate a user
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSuspendInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── Notifications ──────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get current user's notifications
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }
        "401":
          description: Unauthorized

  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized
        "404":
          description: Not found

